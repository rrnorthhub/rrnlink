<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>北輔中心甘特圖</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f2;--card:#fdfcfa;--dim:#f0ede8;--line:#e8e3dd;--hair:#d8d2cb;
  --sage:#7a9e8e;--sage-lt:#eef3f0;--sage-dk:#4e7566;
  --clay:#b07d62;--clay-lt:#f5ede7;
  --amber:#c49a3c;--amber-lt:#faf3e0;
  --red:#b05c5c;--red-lt:#f5eaea;
  --ink:#2c2c2c;--sub:#6b6560;--muted:#a89f96;
}
body{font-family:'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* Header */
.header{background:var(--card);border-bottom:1px solid var(--line);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{width:30px;height:30px;border-radius:8px;background:var(--sage);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;margin-right:10px;flex-shrink:0}
.h-title{font-size:14px;font-weight:800;color:var(--ink)}
.h-sub{font-size:10px;color:var(--muted)}
.sync{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--sage);flex-shrink:0}
.sdot.loading{background:var(--amber);animation:pulse 1s infinite}
.sdot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-back{padding:5px 12px;border:1px solid var(--line);border-radius:8px;background:transparent;font-size:12px;color:var(--sub);cursor:pointer;text-decoration:none;white-space:nowrap}

/* Stats */
.stats{padding:10px 16px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--line);background:var(--card)}
.pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;cursor:pointer;border:1px solid transparent;font-size:11px}
.today-info{margin-left:auto;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.tline-icon{width:2px;height:14px;background:var(--red);border-radius:1px;opacity:.7}

/* Alert */
.alert{background:var(--amber-lt);border-bottom:1px solid #f0c060;padding:10px 16px;font-size:12px;color:var(--ink);display:none;line-height:1.8}

/* Wrap */
.wrap{max-width:1400px;margin:0 auto;padding:16px 16px 48px}

/* Gantt 外層 */
.gantt{background:var(--card);border-radius:12px;border:1px solid var(--line);overflow:hidden}

/* 每一列結構：左固定 + 右可捲動 */
.g-row{display:flex;align-items:stretch;border-bottom:1px solid var(--line)}
.g-row:last-child{border-bottom:none}

/* 左側固定欄（工作項目）*/
.fixed{width:180px;min-width:180px;flex-shrink:0;position:sticky;left:0;z-index:10;background:inherit;border-right:1px solid var(--line)}

/* 右側可捲動區（月份+色條）*/
.scrollable{flex:1;overflow-x:auto;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain}
.scrollable::-webkit-scrollbar{height:3px}
.scrollable::-webkit-scrollbar-thumb{background:var(--hair);border-radius:2px}

/* 月份列 */
.months-row{display:flex;min-width:800px;height:100%}
.month{width:75px;flex-shrink:0;text-align:center;padding:10px 0;font-size:10px;font-weight:600;color:var(--muted);border-right:1px solid var(--line)}
.month:last-child{border-right:none}
.month.cur{background:var(--sage-lt);color:var(--sage-dk);font-weight:800}

/* Header 列 */
.g-header{display:flex;align-items:stretch;background:var(--dim);border-bottom:2px solid var(--line);position:sticky;top:52px;z-index:100}
.g-header .fixed{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;display:flex;align-items:center;padding:0 14px;min-height:50px;background:var(--dim)}
.g-header .scrollable{background:var(--dim)}

/* 類別標題列 */
.cat-row{display:flex;align-items:stretch;background:var(--dim);border-bottom:1px solid var(--line);border-top:1px solid var(--line);cursor:pointer;user-select:none}
.cat-fixed{width:180px;min-width:180px;flex-shrink:0;position:sticky;left:0;z-index:10;background:var(--dim);border-right:1px solid var(--line);display:flex;align-items:center;padding:8px 12px;gap:6px}
.cat-bar-line{width:3px;height:14px;border-radius:2px;flex-shrink:0}
.cat-name{font-size:12px;font-weight:800;color:var(--ink);white-space:nowrap}
.cat-badge{font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:2px}
.cat-arrow{font-size:11px;color:var(--muted);margin-left:auto}
.cat-scroll{flex:1;min-width:800px;background:var(--dim)}

/* 工作項目列 */
.task-fixed{display:flex;flex-direction:column;justify-content:center;padding:12px 12px;min-height:65px}
.task-name{font-size:12px;font-weight:600;color:var(--ink);line-height:1.5;word-break:keep-all}
.task-st{display:flex;align-items:center;gap:4px;margin-top:4px}
.sdot2{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.st-text{font-size:10px}

/* 色條區 */
.bar-wrap{min-width:800px;position:relative;min-height:65px}
.mgrid{position:absolute;top:0;bottom:0;width:75px;border-right:1px solid var(--line);pointer-events:none}
.mgrid.cur{background:rgba(122,158,142,.08)}
.tday{position:absolute;top:0;bottom:0;width:2px;background:var(--red);opacity:.6;pointer-events:none;z-index:3}
.gbar{position:absolute;top:50%;transform:translateY(-50%);height:22px;border-radius:5px;min-width:4px;z-index:2;display:flex;align-items:center;overflow:hidden}
.gbar.done{background-image:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,.3) 3px,rgba(255,255,255,.3) 6px)}
.blabel{font-size:9px;font-weight:700;color:#fff;padding-left:7px;white-space:nowrap;overflow:hidden;text-shadow:0 1px 2px rgba(0,0,0,.25)}

/* Tooltip */
.tip{position:fixed;background:var(--ink);color:#f8fafc;border-radius:10px;padding:12px 14px;width:230px;z-index:9999;pointer-events:none;box-shadow:0 8px 32px rgba(0,0,0,.3);font-size:11px;line-height:1.6;display:none}
.tip-title{font-weight:700;font-size:13px;margin-bottom:6px}

/* Legend */
.legend{display:flex;gap:12px;margin-top:14px;flex-wrap:wrap;align-items:center;font-size:11px;color:var(--sub)}
.li{display:flex;align-items:center;gap:4px}

/* Loading */
.loading-wrap{padding:60px 0;text-align:center;color:var(--muted);font-size:13px}
.spinner{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--sage);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;min-width:0;flex:1">
    <div class="logo">北</div>
    <div style="min-width:0">
      <div class="h-title">北輔中心計畫期程甘特圖</div>
      <div class="h-sub">115年度地方創生北區輔導中心</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:12px">
    <div class="sync"><div class="sdot" id="sd"></div><span id="st">載入中…</span></div>
    <a href="/#internal" class="btn-back">← 返回</a>
  </div>
</div>

<div class="alert" id="alert"></div>

<div class="stats">
  <div class="pill" onclick="setF('')" style="background:var(--dim);border-color:var(--line)">
    <span style="color:var(--sub)">全部</span><span id="c-all" style="font-weight:900;color:var(--ink)">0</span>
  </div>
  <div class="pill" onclick="setF('完成')" style="background:var(--sage-lt);border-color:var(--sage)">
    <div style="width:7px;height:7px;border-radius:50%;background:var(--sage)"></div>
    <span style="color:var(--sage-dk)">完成</span><span id="c-done" style="font-weight:900;color:var(--sage-dk)">0</span>
  </div>
  <div class="pill" onclick="setF('執行中')" style="background:var(--clay-lt);border-color:var(--clay)">
    <div style="width:7px;height:7px;border-radius:50%;background:var(--clay)"></div>
    <span style="color:var(--clay)">執行中</span><span id="c-act" style="font-weight:900;color:var(--clay)">0</span>
  </div>
  <div class="pill" onclick="setF('待辦')" style="background:var(--dim);border-color:var(--line)">
    <div style="width:7px;height:7px;border-radius:50%;background:var(--muted)"></div>
    <span style="color:var(--muted)">待辦</span><span id="c-pend" style="font-weight:900;color:var(--muted)">0</span>
  </div>
  <div class="pill" onclick="setF('即將到期')" style="background:var(--amber-lt);border-color:var(--amber)">
    <div style="width:7px;height:7px;border-radius:50%;background:var(--amber)"></div>
    <span style="color:var(--amber)">即將到期</span><span id="c-warn" style="font-weight:900;color:var(--amber)">0</span>
  </div>
  <div class="pill" onclick="setF('逾期')" style="background:var(--red-lt);border-color:var(--red)">
    <div style="width:7px;height:7px;border-radius:50%;background:var(--red)"></div>
    <span style="color:var(--red)">逾期</span><span id="c-over" style="font-weight:900;color:var(--red)">0</span>
  </div>
  <div class="today-info"><div class="tline-icon"></div>今日 <span id="today-lbl"></span></div>
</div>

<div class="wrap">
  <div class="gantt" id="gantt">
    <div class="loading-wrap"><div class="spinner"></div>從 Google Sheets 載入資料中…</div>
  </div>
  <div class="legend">
    <span style="font-weight:600;color:var(--muted)">圖例：</span>
    <div class="li"><div style="width:2px;height:14px;background:var(--red);border-radius:1px;opacity:.7"></div>今日</div>
    <div class="li"><div style="width:22px;height:10px;border-radius:3px;background-image:repeating-linear-gradient(45deg,var(--sage),var(--sage) 3px,var(--sage-lt) 3px,var(--sage-lt) 6px)"></div>完成</div>
    <div class="li"><div style="width:22px;height:10px;border-radius:3px;background:var(--clay)"></div>執行中</div>
    <div class="li"><div style="width:22px;height:10px;border-radius:3px;background:var(--amber)"></div>即將到期</div>
    <div class="li"><div style="width:22px;height:10px;border-radius:3px;background:var(--red)"></div>逾期</div>
    <div class="li"><div style="width:22px;height:10px;border-radius:3px;background:var(--muted)"></div>待辦</div>
    <span style="margin-left:auto;color:var(--muted)">左右滑動查看期程 · 每5分鐘自動同步</span>
  </div>
</div>

<div class="tip" id="tip"></div>

<script>
const SID='1OgljOYoEprfJ7qF5xKyTJ-0-BnWsAPlfevQq6Y9WC1M';
const MONTHS=[
  {l:'5月',d:'2026-05-01'},{l:'6月',d:'2026-06-01'},{l:'7月',d:'2026-07-01'},
  {l:'8月',d:'2026-08-01'},{l:'9月',d:'2026-09-01'},{l:'10月',d:'2026-10-01'},
  {l:'11月',d:'2026-11-01'},{l:'12月',d:'2026-12-01'},{l:'116/1',d:'2027-01-01'},
  {l:'2月',d:'2027-02-01'},{l:'3月',d:'2027-03-01'},{l:'4月',d:'2027-04-01'},
];
const RS='2026-05-01',RE='2027-04-30';
const TD=Math.round((new Date(RE)-new Date(RS))/86400000);
const TODAY=new Date().toISOString().slice(0,10);
const MONTH_W=75;
const TOTAL_W=MONTHS.length*MONTH_W;

const CAT_C={'行政作業':'#7a9e8e','區域輔導':'#b07d62','特色亮點':'#c49a3c','行銷整合':'#4e7566','市集活動':'#b07d62','成果展':'#7a9e8e','報告繳交':'#b05c5c'};
const ST_C={'完成':'#7a9e8e','執行中':'#b07d62','待辦':'#a89f96','逾期':'#b05c5c','即將到期':'#c49a3c'};

let tasks=[],filt='',coll={};

function toX(d){return Math.min(TOTAL_W,Math.max(0,(new Date(d)-new Date(RS))/86400000/TD*TOTAL_W));}
function toW(s,e){return Math.max(4,toX(e)-toX(s));}
function daysLeft(e){return Math.round((new Date(e)-new Date(TODAY))/86400000);}

function parseGDate(v){
  if(!v)return'';
  if(typeof v==='string'&&v.startsWith('Date(')){
    const p=v.replace('Date(','').replace(')','').split(',');
    return p[0]+'-'+String(+p[1]+1).padStart(2,'0')+'-'+String(+p[2]).padStart(2,'0');
  }
  return'';
}

async function load(){
  setSt('loading','同步中…');
  try{
    const url=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&tq=select+A,B,C,D,E,F,G&gid=0`;
    const r=await fetch(url);
    const t=await r.text();
    const m=t.match(/setResponse\((\{[\s\S]*\})\)/);
    if(!m)throw new Error('解析失敗');
    const j=JSON.parse(m[1]);
    tasks=j.table.rows.map((row,i)=>{
      const c=row.c;
      const g=idx=>c[idx]?String(c[idx].f||c[idx].v||'').trim():'';
      const gd=idx=>c[idx]?parseGDate(String(c[idx].v||'')):'';
      return{id:i,name:g(0),cat:g(1),s:gd(2),e:gd(3),st:g(4)||'待辦',p:g(5),n:g(6)};
    }).filter(t=>t.name&&t.s&&t.e);
    tasks.forEach(t=>{
      if(t.st!=='完成'){
        if(t.e<TODAY)t.st='逾期';
        else if(daysLeft(t.e)<=14)t.st='即將到期';
      }
    });
    setSt('ok','已同步 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}));
    render();
  }catch(e){
    setSt('error','同步失敗');
    console.error(e);
  }
}

function setSt(type,txt){
  document.getElementById('sd').className='sdot'+(type==='loading'?' loading':type==='error'?' error':'');
  document.getElementById('st').textContent=txt;
}

function setF(f){filt=f;render();}

function render(){
  document.getElementById('today-lbl').textContent=TODAY;
  const done=tasks.filter(t=>t.st==='完成').length;
  const act=tasks.filter(t=>t.st==='執行中').length;
  const pend=tasks.filter(t=>t.st==='待辦').length;
  const over=tasks.filter(t=>t.st==='逾期').length;
  const warn=tasks.filter(t=>t.st==='即將到期').length;
  document.getElementById('c-all').textContent=tasks.length;
  document.getElementById('c-done').textContent=done;
  document.getElementById('c-act').textContent=act;
  document.getElementById('c-pend').textContent=pend;
  document.getElementById('c-over').textContent=over;
  document.getElementById('c-warn').textContent=warn;

  const al=document.getElementById('alert');
  let ah='';
  if(over>0)ah+=`<div>🔴 逾期 ${over} 項：${tasks.filter(t=>t.st==='逾期').map(t=>t.name).join('、')}</div>`;
  if(warn>0)ah+=`<div>⏰ 即將到期（14天內）${warn} 項：${tasks.filter(t=>t.st==='即將到期').map(t=>t.name+'（剩'+daysLeft(t.e)+'天）').join('、')}</div>`;
  if(ah){al.innerHTML=ah;al.style.display='block';}else al.style.display='none';

  const shown=filt?tasks.filter(t=>t.st===filt):tasks;
  const catMap={};
  shown.forEach(t=>{if(!catMap[t.cat])catMap[t.cat]=[];catMap[t.cat].push(t);});
  const todayX=toX(TODAY);
  const curM=TODAY.slice(0,7);

  const gridsHtml=MONTHS.map((m,i)=>{
    const isc=m.d.slice(0,7)===curM;
    return`<div class="mgrid${isc?' cur':''}" style="left:${i*MONTH_W}px;${isc?'background:rgba(122,158,142,.08)':''}"></div>`;
  }).join('');
  const todayHtml=todayX>0&&todayX<TOTAL_W?`<div class="tday" style="left:${todayX}px"></div>`:'';

  let html=`<div class="g-header">
    <div class="fixed" style="background:var(--dim);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;padding:0 14px;display:flex;align-items:center;min-height:50px">工作項目</div>
    <div class="scrollable" id="sh" style="background:var(--dim)">
      <div class="months-row" style="min-width:${TOTAL_W}px">
        ${MONTHS.map(m=>{const isc=m.d.slice(0,7)===curM;return`<div class="month${isc?' cur':''}">${m.l}</div>`;}).join('')}
      </div>
    </div>
  </div>`;

  if(!Object.keys(catMap).length){
    html+='<div class="loading-wrap">沒有符合條件的項目</div>';
  }else{
    Object.keys(catMap).forEach(cat=>{
      const items=catMap[cat];
      const cc=CAT_C[cat]||'#7a9e8e';
      const isC=coll[cat];
      html+=`<div class="cat-row" onclick="toggleCat('${cat}')">
        <div class="cat-fixed">
          <div class="cat-bar-line" style="background:${cc}"></div>
          <span class="cat-name">${cat}</span>
          <span class="cat-badge" style="background:${cc}22;color:${cc}">${items.length}</span>
          <span class="cat-arrow">${isC?'▶':'▼'}</span>
        </div>
        <div class="cat-scroll" style="min-width:${TOTAL_W}px"></div>
      </div>`;

      if(!isC){
        items.forEach((t,idx)=>{
          const sc=ST_C[t.st]||'#a89f96';
          const lx=toX(t.s),ww=toW(t.s,t.e);
          const bg=idx%2===0?'var(--card)':'var(--bg)';
          html+=`<div class="g-row" style="background:${bg}">
            <div class="fixed" style="background:${bg}">
              <div class="task-fixed">
                <div class="task-name">${t.name}</div>
                <div class="task-st"><div class="sdot2" style="background:${sc}"></div><span class="st-text" style="color:${sc}">${t.st}</span></div>
              </div>
            </div>
            <div class="scrollable ss" onmouseenter="showTip(event,${t.id})" onmouseleave="hideTip()" ontouchstart="showTip(event,${t.id})" ontouchend="hideTip()">
              <div class="bar-wrap" style="min-width:${TOTAL_W}px">
                ${gridsHtml}${todayHtml}
                <div class="gbar${t.st==='完成'?' done':''}" style="left:${lx}px;width:${ww}px;background:${sc};box-shadow:0 1px 4px ${sc}44">
                  ${ww>40?`<span class="blabel">${t.s.slice(5,7)}/${t.s.slice(8)}→${t.e.slice(5,7)}/${t.e.slice(8)}</span>`:''}
                </div>
              </div>
            </div>
          </div>`;
        });
      }
    });
  }

  document.getElementById('gantt').innerHTML=html;
  setupSync();
}

function toggleCat(c){coll[c]=!coll[c];render();}

function setupSync(){
  const all=[document.getElementById('sh'),...document.querySelectorAll('.ss')].filter(Boolean);
  let isSyncing=false;
  all.forEach(el=>{
    el.addEventListener('scroll',()=>{
      if(isSyncing)return;
      isSyncing=true;
      all.forEach(other=>{if(other!==el)other.scrollLeft=el.scrollLeft;});
      requestAnimationFrame(()=>{isSyncing=false;});
    },{passive:true});
  });
}

function showTip(e,id){
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  const sc=ST_C[t.st]||'#a89f96';
  const tip=document.getElementById('tip');
  tip.innerHTML=`<div class="tip-title">${t.name}</div>
    <div>狀態：<span style="color:${sc};font-weight:700">${t.st}</span></div>
    <div>期間：${t.s} → ${t.e}</div>
    <div>類別：${t.cat}</div>
    ${t.p?`<div>負責人：${t.p}</div>`:''}
    ${t.n?`<div style="margin-top:6px;padding-top:6px;border-top:1px solid #fff2;color:var(--amber)">💬 ${t.n}</div>`:''}`;
  tip.style.display='block';
  moveTip(e);
}
function moveTip(e){
  const tip=document.getElementById('tip');
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  tip.style.left=Math.min(cx+12,window.innerWidth-245)+'px';
  tip.style.top=Math.min(cy-10,window.innerHeight-200)+'px';
}
function hideTip(){document.getElementById('tip').style.display='none';}
document.addEventListener('mousemove',e=>{if(document.getElementById('tip').style.display!=='none')moveTip(e);});

load();
setInterval(load,5*60*1000);
</script>
</body>
</html>
