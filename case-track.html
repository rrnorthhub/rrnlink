<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>過案追蹤 ｜ 地方創生北區輔導中心</title>
<style>
  :root{
    --green:#5c7a5c;          /* 主墨綠 */
    --green-dark:#3f5840;
    --green-soft:#e8efe7;     /* 淺綠方塊 */
    --green-line:#d4e0d2;
    --bg:#f4f5f2;
    --card:#ffffff;
    --ink:#2b322b;
    --ink-soft:#7c857b;
    --line:#e4e7e1;
    --amber:#c98a2b;
    --amber-soft:#fbeed4;
    --red:#b5503f;
    --blue-grey:#6b7d8a;
    --radius:14px;
    --shadow:0 1px 3px rgba(40,50,40,.06),0 4px 16px rgba(40,50,40,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }

  /* ── 頂部 ── */
  header{
    background:#fbfcfa;border-bottom:1px solid var(--line);
    padding:18px 28px;display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:50;
  }
  .brand{display:flex;align-items:center;gap:14px}
  .brand .logo{
    width:46px;height:46px;border-radius:11px;background:var(--green);
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-size:20px;font-weight:700;letter-spacing:1px;
  }
  .brand h1{font-size:17px;font-weight:700;color:var(--ink)}
  .brand p{font-size:12px;color:var(--ink-soft);font-weight:400}
  .back-btn{
    border:1px solid var(--green-line);background:#fff;color:var(--green-dark);
    padding:8px 18px;border-radius:9px;font-size:14px;cursor:pointer;
    text-decoration:none;transition:.15s;
  }
  .back-btn:hover{background:var(--green-soft)}

  /* ── 主體 ── */
  main{max-width:1080px;margin:0 auto;padding:32px 24px 80px}
  .eyebrow{font-size:13px;color:var(--green);letter-spacing:2px;font-weight:600;margin-bottom:6px}
  .page-title{font-size:30px;font-weight:800;letter-spacing:.5px;margin-bottom:6px}
  .page-desc{color:var(--ink-soft);font-size:14px;margin-bottom:28px}

  /* ── 篩選列 ── */
  .filter-bar{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:20px 22px;display:flex;gap:18px;
    flex-wrap:wrap;align-items:flex-end;margin-bottom:26px;
  }
  .field{display:flex;flex-direction:column;gap:6px;min-width:200px;flex:1}
  .field label{font-size:13px;color:var(--ink-soft);font-weight:600}
  select,input[type=text]{
    font-family:inherit;font-size:14px;padding:10px 12px;border:1px solid var(--line);
    border-radius:9px;background:#fff;color:var(--ink);transition:.15s;width:100%;
  }
  select:focus,input:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px var(--green-soft)}
  select:disabled{background:#f3f4f1;color:#b3bab1;cursor:not-allowed}

  /* ── 狀態提示 ── */
  .hint{text-align:center;padding:60px 20px;color:var(--ink-soft)}
  .hint .big{font-size:15px;margin-bottom:4px;color:var(--ink)}
  .loading{display:inline-block;width:20px;height:20px;border:2.5px solid var(--green-line);
    border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── 主計畫群組 ── */
  .plan-group{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;transition:.15s}
  .plan-group.archivable{border-color:var(--green-line)}
  .plan-head{padding:18px 22px;display:flex;align-items:center;gap:16px;cursor:pointer;transition:.12s}
  .plan-head:hover{background:#fafbf9}
  .plan-chev{color:var(--ink-soft);font-size:14px;transition:.2s;flex-shrink:0}
  .plan-group.open .plan-chev{transform:rotate(90deg);color:var(--green)}
  .plan-info{flex:1;min-width:0}
  .plan-title-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:4px}
  .plan-code{font-size:12px;font-weight:700;color:var(--green-dark);background:var(--green-soft);padding:2px 9px;border-radius:6px;flex-shrink:0;letter-spacing:.3px}
  .plan-name{font-weight:700;font-size:16px;color:var(--ink)}
  .plan-meta{font-size:12.5px;color:var(--ink-soft);display:flex;gap:14px;flex-wrap:wrap}
  .plan-meta .sep{color:var(--line)}
  .archive-btn{flex-shrink:0;border:none;padding:9px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
  .archive-btn.ready{background:var(--green);color:#fff}
  .archive-btn.ready:hover{background:var(--green-dark)}
  .archive-btn.locked{background:#f0f2ee;color:#b3bab1;cursor:not-allowed}
  .plan-body{display:none;border-top:1px solid var(--line);padding:6px 14px 14px;background:#fcfdfb}
  .plan-group.open .plan-body{display:block}
  .sub-card{background:#fff;border:1px solid var(--line);border-radius:10px;margin-top:10px;overflow:hidden}
  .sub-card.open{border-color:var(--green-line)}
  .sub-head{padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:.12s}
  .sub-head:hover{background:#fafbf9}
  .sub-chev{color:var(--ink-soft);font-size:12px;transition:.2s;flex-shrink:0}
  .sub-card.open .sub-chev{transform:rotate(90deg);color:var(--green)}
  .sub-info{flex:1;min-width:0}
  .sub-name{font-weight:600;font-size:14px}
  .sub-plan{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sub-body{display:none;border-top:1px solid var(--line);padding:4px 16px 18px}
  .sub-card.open .sub-body{display:block}

  /* ── 團隊清單 ── */
  .team-count{font-size:13px;color:var(--ink-soft);margin-bottom:12px}
  .team-count b{color:var(--green-dark)}
  .team-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden;transition:.15s;
  }
  .team-card.open{border-color:var(--green-line)}
  .team-head{
    padding:16px 20px;cursor:pointer;display:flex;align-items:center;gap:14px;
    transition:.12s;
  }
  .team-head:hover{background:#fafbf9}
  .team-head .chev{color:var(--ink-soft);transition:.2s;font-size:13px;flex-shrink:0}
  .team-card.open .chev{transform:rotate(90deg);color:var(--green)}
  .team-head .info{flex:1;min-width:0}
  .team-head .title-line{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .team-head .code{
    font-size:12px;font-weight:700;color:var(--green-dark);
    background:var(--green-soft);padding:2px 9px;border-radius:6px;flex-shrink:0;
    letter-spacing:.3px;
  }
  .team-head .tname{font-weight:700;font-size:15.5px;color:var(--ink)}
  .team-head .divider{color:var(--line);font-weight:300}
  .team-head .pname{font-size:13px;color:var(--ink-soft);font-weight:400}
  .badge{
    font-size:12px;font-weight:600;padding:4px 11px;border-radius:20px;flex-shrink:0;
    white-space:nowrap;
  }
  .badge.exec{background:var(--green-soft);color:var(--green-dark)}
  .badge.review{background:#eaf0f4;color:var(--blue-grey)}
  .badge.done{background:#eef0ec;color:#8a948a}
  .badge.warn{background:var(--amber-soft);color:var(--amber)}
  .badge.stop{background:#f6e7e4;color:var(--red)}
  .badge.closed{background:var(--green-dark);color:#fff}

  /* ── 展開內容 ── */
  .team-body{display:none;border-top:1px solid var(--line);padding:4px 20px 22px}
  .team-card.open .team-body{display:block}
  .section{margin-top:20px}
  .section-title{
    font-size:13px;font-weight:700;color:var(--green-dark);letter-spacing:1px;
    display:flex;align-items:center;gap:8px;margin-bottom:14px;
  }
  .section-title .num{
    width:20px;height:20px;border-radius:6px;background:var(--green-soft);color:var(--green-dark);
    display:inline-flex;align-items:center;justify-content:center;font-size:12px;
  }

  /* 基本資料 - 留白式 */
  .info-grid{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:18px 28px;padding:6px 2px;
  }
  .info-cell{min-width:0}
  .info-cell.span2{grid-column:span 2}
  .info-cell.span3{grid-column:span 3}
  .info-cell .k{font-size:12px;color:var(--ink-soft);margin-bottom:3px;letter-spacing:.2px}
  .info-cell .v{font-size:14px;color:var(--ink);word-break:break-word;line-height:1.55;font-weight:500}
  .info-cell .v.empty{color:#cdd2cb;font-weight:400}

  .resync-row{margin-top:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .btn-ghost{
    border:1px solid var(--green-line);background:#fff;color:var(--green-dark);
    padding:8px 16px;border-radius:9px;font-size:13px;cursor:pointer;font-family:inherit;transition:.15s;
  }
  .btn-ghost:hover{background:var(--green-soft)}
  .resync-row .note{font-size:12px;color:var(--ink-soft)}

  /* 核定後進度 - 垂直時間軸 */
  .timeline{padding:4px 0 4px 4px}
  .tl-item{display:flex;gap:16px;position:relative;padding-bottom:18px}
  .tl-item:last-child{padding-bottom:0}
  .tl-dot{
    width:26px;height:26px;border-radius:50%;flex-shrink:0;position:relative;z-index:2;
    display:flex;align-items:center;justify-content:center;font-size:12px;
    background:#fff;border:2px solid var(--line);color:#bcc3ba;transition:.2s;
  }
  .tl-item.done .tl-dot{background:var(--green);border-color:var(--green);color:#fff}
  .tl-item.active .tl-dot{background:#fff;border-color:var(--green);box-shadow:0 0 0 4px var(--green-soft)}
  .tl-item.active .tl-dot::after{content:"";width:9px;height:9px;border-radius:50%;background:var(--green)}
  /* 連線 */
  .tl-item:not(:last-child)::before{
    content:"";position:absolute;left:12px;top:26px;width:2px;height:calc(100% - 26px);
    background:var(--line);z-index:1;
  }
  .tl-item.done:not(:last-child)::before{background:var(--green-line)}
  .tl-content{padding-top:2px;min-width:0}
  .tl-label{font-size:14px;font-weight:600;color:var(--ink-soft);line-height:1.4}
  .tl-item.done .tl-label,.tl-item.active .tl-label{color:var(--ink)}
  .tl-meta{font-size:12.5px;color:var(--ink-soft);margin-top:1px}
  .tl-item.done .tl-meta{color:var(--green-dark)}
  .tl-item.active .tl-meta{color:var(--green);font-weight:600}

  /* 填寫表單 */
  .form-group{margin-bottom:20px}
  .form-group:last-child{margin-bottom:0}
  .group-label{
    font-size:12px;font-weight:700;color:var(--ink-soft);letter-spacing:.5px;
    padding-bottom:8px;margin-bottom:12px;border-bottom:1px dashed var(--line);
    display:flex;align-items:center;gap:7px;
  }
  .group-label .tip{font-size:11px;font-weight:400;color:#b3bab1}
  .form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:13px 16px}
  .form-grid.cols3{grid-template-columns:repeat(3,1fr)}
  .form-field{display:flex;flex-direction:column;gap:5px;min-width:0}
  .form-field.full{grid-column:1/-1}
  .form-field label{font-size:12.5px;color:var(--ink-soft);font-weight:600}
  .form-field .locked-tag{font-size:10.5px;color:var(--amber);font-weight:600;margin-left:4px}
  .form-field input:disabled,.form-field select:disabled{background:#f3f4f1;color:#8a8f87}
  .form-actions{margin-top:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .btn-save{
    background:var(--green);color:#fff;border:none;padding:11px 26px;border-radius:9px;
    font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;
  }
  .btn-save:hover{background:var(--green-dark)}
  .btn-save:disabled{opacity:.5;cursor:not-allowed}
  .save-msg{font-size:13px}
  .save-msg.ok{color:var(--green)}
  .save-msg.err{color:var(--red)}

  /* 執行狀況 log */
  .log-box{
    margin-top:8px;background:#fafbf9;border:1px solid var(--line);border-radius:10px;
    padding:12px 14px;max-height:180px;overflow-y:auto;font-size:12.5px;line-height:1.8;
  }
  .log-line{display:flex;gap:6px}
  .log-line.sys{color:#9aa19a}
  .log-line.note{color:var(--ink)}


  /* ── 總覽統計 ── */
  .overview{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:22px 24px;margin-bottom:26px;
  }
  .ov-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px}
  #ovCountySel{padding:8px 14px;border:1px solid var(--line);border-radius:9px;font-family:inherit;font-size:13px;color:var(--ink);background:#fff;cursor:pointer}
  #ovCountySel:focus{outline:none;border-color:var(--green)}
  .overview-single{margin-top:18px}
  .dot-amber{background:var(--amber, #c98a2b) !important}
  .ov-title{font-size:15px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:9px}
  .ov-title .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
  .ov-title .total{font-size:13px;font-weight:400;color:var(--ink-soft);margin-left:4px}
  .btn-export{
    background:#fff;border:1px solid var(--green-line);color:var(--green-dark);
    padding:8px 16px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;
    font-family:inherit;transition:.15s;display:inline-flex;align-items:center;gap:6px;
  }
  .btn-export:hover{background:var(--green-soft)}
  .stat-grid{
    display:grid;grid-template-columns:repeat(6,1fr);gap:12px;
  }
  .stat-card{
    background:#fbfcfa;border:1px solid var(--line);border-radius:11px;
    padding:14px 12px;text-align:center;cursor:pointer;transition:.15s;
  }
  .stat-card:hover{border-color:var(--green-line);background:var(--green-soft);transform:translateY(-1px)}
  .stat-card .num{font-size:26px;font-weight:800;color:var(--green-dark);line-height:1.1}
  .stat-card .lbl{font-size:12px;color:var(--ink-soft);margin-top:4px;line-height:1.3}
  .stat-card.zero .num{color:#c8cec6}

  /* ── modal ── */
  .modal-mask{
    position:fixed;inset:0;background:rgba(40,50,40,.4);z-index:300;
    display:none;align-items:center;justify-content:center;padding:20px;
  }
  .modal-mask.show{display:flex}
  .modal{
    background:#fff;border-radius:16px;max-width:640px;width:100%;max-height:80vh;
    display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(40,50,40,.25);
  }
  .modal-head{
    padding:18px 22px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;
  }
  .modal-head h3{font-size:16px;font-weight:700;color:var(--ink)}
  .modal-head .cnt{font-size:13px;color:var(--ink-soft);font-weight:400;margin-left:6px}
  .modal-close{
    border:none;background:#f3f4f1;width:30px;height:30px;border-radius:8px;
    cursor:pointer;font-size:16px;color:var(--ink-soft);transition:.15s;
  }
  .modal-close:hover{background:#e4e7e1}
  .modal-body{padding:8px 22px 20px;overflow-y:auto}
  .modal-row{
    display:grid;grid-template-columns:72px 1fr;gap:12px;padding:11px 0;
    border-bottom:1px solid #f0f2ee;font-size:13.5px;
  }
  .modal-row:last-child{border-bottom:none}
  .modal-row .mc{color:var(--green-dark);font-weight:600}
  .modal-row .mt{color:var(--ink)}
  .modal-row .mt .mp{display:block;font-size:12px;color:var(--ink-soft);margin-top:2px}
  .modal-empty{text-align:center;color:var(--ink-soft);padding:30px}

  /* toast */
  #toast{
    position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--green-dark);color:#fff;padding:13px 24px;border-radius:10px;
    font-size:14px;box-shadow:0 8px 24px rgba(40,50,40,.2);opacity:0;pointer-events:none;
    transition:.25s;z-index:200;
  }
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.err{background:var(--red)}

  @media(max-width:900px){
    .stat-grid{grid-template-columns:repeat(3,1fr)}
  }
  @media(max-width:760px){
    .info-grid{grid-template-columns:repeat(2,1fr);gap:16px 22px}
    .info-cell.span3{grid-column:span 2}
  }
  @media(max-width:640px){
    header{padding:14px 16px}
    .brand h1{font-size:15px}.brand p{font-size:11px}
    main{padding:22px 14px 60px}
    .page-title{font-size:24px}
    .filter-bar{flex-direction:column;align-items:stretch}
    .field{min-width:0}
    .info-grid{grid-template-columns:1fr}
    .info-cell.span2,.info-cell.span3{grid-column:span 1}
    .form-grid{grid-template-columns:1fr}
    .form-field:empty{display:none}
    .stat-grid{grid-template-columns:repeat(2,1fr)}
    .stat-card .num{font-size:22px}
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo">北</div>
    <div>
      <h1>地方創生北區輔導中心</h1>
      <p>Regional Revitalization North Hub</p>
    </div>
  </div>
  <a href="/#internal" class="back-btn">← 返回工作區</a>
</header>

<main>
  <div class="eyebrow">內部工作區</div>
  <h2 class="page-title">過案追蹤</h2>
  <p class="page-desc">選擇縣市查看過案團隊，點開團隊填寫核定後執行進度。</p>

  <!-- 總覽統計 -->
  <div class="overview" id="overview">
    <div class="ov-head">
      <div class="ov-title"><span class="dot"></span>八縣市過案總覽 <span class="total" id="ovTotal"></span></div>
      <button class="btn-export" onclick="exportExcel()">⬇ 匯出 Excel 報表</button>
    </div>
    <div class="stat-grid" id="statGrid">
      <div class="hint" style="grid-column:1/-1;padding:20px"><span class="loading"></span> 載入統計中…</div>
    </div>
  </div>

  <!-- 個別縣市統計 -->
  <div class="overview overview-single" id="overviewSingle">
    <div class="ov-head">
      <div class="ov-title"><span class="dot dot-amber"></span>個別縣市查詢
        <span class="total" id="ovSingleTotal"></span>
      </div>
      <select id="ovCountySel" onchange="onOvCountyChange()">
        <option value="">請選擇縣市…</option>
        <option value="臺北市">臺北市</option>
        <option value="基隆市">基隆市</option>
        <option value="新北市">新北市</option>
        <option value="桃園市">桃園市</option>
        <option value="新竹縣">新竹縣</option>
        <option value="新竹市">新竹市</option>
        <option value="金門縣">金門縣</option>
        <option value="連江縣">連江縣</option>
      </select>
    </div>
    <div class="stat-grid" id="statGridSingle">
      <div class="hint" style="grid-column:1/-1;padding:20px;color:var(--ink-soft)">選擇縣市以查看該縣市統計（含歷史案件）</div>
    </div>
  </div>

  <!-- 篩選列 -->
  <div class="filter-bar">
    <div class="field">
      <label for="countySel">縣市</label>
      <select id="countySel">
        <option value="">請選擇縣市…</option>
        <option value="A臺北市">臺北市</option>
        <option value="B基隆市">基隆市</option>
        <option value="C新北市">新北市</option>
        <option value="D桃園市">桃園市</option>
        <option value="E新竹縣">新竹縣</option>
        <option value="F新竹市">新竹市</option>
        <option value="G金門縣">金門縣</option>
        <option value="H連江縣">連江縣</option>
      </select>
    </div>
    <div class="field">
      <label for="teamSel">團隊（可選）</label>
      <select id="teamSel" disabled>
        <option value="">全部團隊</option>
      </select>
    </div>
  </div>

  <!-- 結果區 -->
  <div id="result">
    <div class="hint">
      <div class="big">尚未選擇縣市</div>
      <div>從上方選一個縣市，即可載入過案團隊清單。</div>
    </div>
  </div>
</main>

<!-- 統計彈窗 -->
<div class="modal-mask" id="modalMask" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3 id="modalTitle">狀態<span class="cnt" id="modalCnt"></span></h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwwUcitNoAFIf-TP6ABZrtsrOAAuiKfdOhS9d0tfoZHjl_W4U2sofw8FfXNBbbE81_-/exec';

// 各欄位下拉選項
const OPTIONS = {
  reviewStat:  ['', '進行中', '已完成'],
  reviseStat:  ['', '進行中', '已完成'],
  approveStat: ['', '進行中', '已完成'],
  execProg:    ['', '第1期', '第2期', '第3期', '已撤案', '申請未通過'],
  settlement:  ['', '尚未', '第1期核銷', '第2期核銷', '第3期核銷', '尾款核銷'],
  payment:     ['', '尚未', '第1期已核撥', '第2期已核撥', '第3期已核撥', '尾款已撥付'],
  isLocal:     ['', '是', '否'],
};

let currentCounty = '';
let allRows = [];   // 該縣市所有資料

const $ = s => document.querySelector(s);
const countySel = $('#countySel');
const teamSel   = $('#teamSel');
const result    = $('#result');

// ── 統計分類定義 ──
const STAT_GROUPS = [
  {key:'pending',  label:'尚未收件', match:(s)=> !s },
  {key:'review',   label:'審核中',   match:(s)=> ['細審完成','細審修正完成','細審修正','細部審查進行中'].includes(s) },
  {key:'approved', label:'核定通過<br>(執行中)', match:(s)=> ['細審核定通過','計畫執行中'].includes(s) },
  {key:'withdraw', label:'已撤案',   match:(s)=> s==='已撤案' },
  {key:'rejected', label:'核定未通過', match:(s)=> s==='申請未通過' },
  {key:'closed',   label:'已結案',   match:(s)=> ['已結案','結案'].includes(s) },
];
// Excel 用的純文字標籤
const STAT_LABELS_PLAIN = ['尚未收件','審核中','核定通過(執行中)','已撤案','核定未通過','已結案'];

let allCountyRows = []; // 全部資料（含歷史，給統計）
let ovFilterCounty = ''; // 總覽篩選縣市（純名稱，空=全部）

function rowCountyName(r){
  if(r.source==='history') return r.countyName || '';
  return r.county ? r.county.slice(1) : '';
}

// ── 載入全部統計（含歷史）──
async function loadOverview(){
  try{
    const res = await fetch(`${API}?action=readall`);
    const data = await res.json();
    if(!data.ok) throw new Error(data.error||'統計讀取失敗');
    allCountyRows = data.rows || [];
    renderOverview();
  }catch(err){
    $('#statGrid').innerHTML = `<div class="hint" style="grid-column:1/-1;padding:20px;color:var(--red)">統計載入失敗：${err.message}</div>`;
  }
}

function classifyStatus(status){
  for(const g of STAT_GROUPS){ if(g.match(status)) return g.key; }
  return 'pending';
}

function filteredOvRows(){
  if(!ovFilterCounty) return allCountyRows;
  return allCountyRows.filter(r=>rowCountyName(r)===ovFilterCounty);
}

function onOvCountyChange(){
  ovFilterCounty = $('#ovCountySel').value;
  renderOverview();
}

// 通用：依資料算各分類數量並產生卡片HTML
function buildStatCards(rows, clickFn){
  const counts = {};
  STAT_GROUPS.forEach(g=>counts[g.key]=0);
  rows.forEach(r=>{ counts[classifyStatus(r.status)]++; });
  return STAT_GROUPS.map(g=>{
    const n = counts[g.key];
    return `<div class="stat-card ${n===0?'zero':''}" onclick="${clickFn}('${g.key}')">
      <div class="num">${n}</div>
      <div class="lbl">${g.label}</div>
    </div>`;
  }).join('');
}

// 八縣市總覽（固定全部，不受個別查詢影響）
function renderOverview(){
  const rows = allCountyRows;
  $('#ovTotal').textContent = `· 共 ${rows.length} 案`;
  $('#statGrid').innerHTML = buildStatCards(rows, 'showStatList');
  // 若個別區已選縣市，一併刷新
  if(ovFilterCounty) renderSingle();
}

// 個別縣市統計
function onOvCountyChange(){
  ovFilterCounty = $('#ovCountySel').value;
  renderSingle();
}

function renderSingle(){
  if(!ovFilterCounty){
    $('#ovSingleTotal').textContent = '';
    $('#statGridSingle').innerHTML = '<div class="hint" style="grid-column:1/-1;padding:20px;color:var(--ink-soft)">選擇縣市以查看該縣市統計（含歷史案件）</div>';
    return;
  }
  const rows = allCountyRows.filter(r=>rowCountyName(r)===ovFilterCounty);
  $('#ovSingleTotal').textContent = `· ${ovFilterCounty} 共 ${rows.length} 案`;
  $('#statGridSingle').innerHTML = buildStatCards(rows, 'showSingleStatList');
}

// ── 點統計卡片 → 彈窗清單（顯示計畫名稱）──
// 總覽（全部八縣市）
function showStatList(key){
  openStatModal(key, allCountyRows, '');
}
// 個別縣市
function showSingleStatList(key){
  const rows = allCountyRows.filter(r=>rowCountyName(r)===ovFilterCounty);
  openStatModal(key, rows, ovFilterCounty ? `${ovFilterCounty}・` : '');
}

function openStatModal(key, sourceRows, scope){
  const group = STAT_GROUPS.find(g=>g.key===key);
  const rows = sourceRows.filter(r=>classifyStatus(r.status)===key);

  const plainLabel = group.label.replace(/<br>/g,'');
  $('#modalTitle').innerHTML = scope + plainLabel + `<span class="cnt" id="modalCnt">共 ${rows.length} 案</span>`;

  if(rows.length===0){
    $('#modalBody').innerHTML = '<div class="modal-empty">目前沒有此狀態的過案</div>';
  }else{
    $('#modalBody').innerHTML = rows.map(r=>{
      const cn = rowCountyName(r);
      const histTag = r.source==='history' ? '<span style="font-size:11px;color:#a89f96;margin-left:6px">（歷史）</span>' : '';
      const name = r.mainPlan || r.team || '（未命名）';
      const teamLine = r.team ? `<span class="mp">${esc(r.team)}</span>` : '';
      return `<div class="modal-row">
        <div class="mc">${esc(cn)}${histTag}</div>
        <div class="mt">${esc(name)}${teamLine}</div>
      </div>`;
    }).join('');
  }
  $('#modalMask').classList.add('show');
}

function closeModal(e){
  $('#modalMask').classList.remove('show');
}

// ── 匯出 Excel（縣市 × 狀態 交叉表，含歷史案件）──
function exportExcel(){
  if(allCountyRows.length===0){ toast('統計尚未載入完成', true); return; }

  const countyNames = ['臺北市','基隆市','新北市','桃園市','新竹縣','新竹市','金門縣','連江縣'];
  // 交叉統計：用純縣市名（活案+歷史合計）
  const matrix = {};
  countyNames.forEach(c=>{ matrix[c]={}; STAT_GROUPS.forEach(g=>matrix[c][g.key]=0); });
  allCountyRows.forEach(r=>{
    const cn = rowCountyName(r);
    if(matrix[cn]) matrix[cn][classifyStatus(r.status)]++;
  });

  const header = ['縣市', ...STAT_LABELS_PLAIN, '合計'];
  const aoa = [header];
  const colTotals = STAT_GROUPS.map(()=>0);
  let grandTotal = 0;
  countyNames.forEach(cn=>{
    const row = [cn];
    let rowTotal = 0;
    STAT_GROUPS.forEach((g,i)=>{
      const n = matrix[cn][g.key];
      row.push(n);
      colTotals[i]+=n;
      rowTotal+=n;
    });
    row.push(rowTotal);
    grandTotal+=rowTotal;
    aoa.push(row);
  });
  aoa.push(['總計', ...colTotals, grandTotal]);

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{wch:10},{wch:10},{wch:10},{wch:14},{wch:8},{wch:12},{wch:8},{wch:8}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '過案統計(含歷史)');

  const d = new Date();
  const roc = (d.getFullYear()-1911) + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
  XLSX.writeFile(wb, `過案統計_含歷史_${roc}.xlsx`);
  toast('Excel 已下載（含歷史案件）');
}


// ── 選縣市 → 載入資料 ──
countySel.addEventListener('change', () => {
  currentCounty = countySel.value;
  teamSel.innerHTML = '<option value="">全部團隊</option>';
  teamSel.disabled = true;
  if (!currentCounty) {
    result.innerHTML = hintHTML('尚未選擇縣市', '從上方選一個縣市，即可載入過案團隊清單。');
    return;
  }
  loadCounty();
});

// ── 選團隊 → 篩選顯示 ──
teamSel.addEventListener('change', renderList);

async function loadCounty(){
  result.innerHTML = `<div class="hint"><div class="loading"></div><div style="margin-top:12px">載入中…</div></div>`;
  try{
    const res = await fetch(`${API}?action=read&county=${encodeURIComponent(currentCounty)}`);
    const data = await res.json();
    if(!data.ok){ throw new Error(data.error || '讀取失敗'); }
    allRows = data.rows || [];

    // 填入團隊下拉
    teamSel.innerHTML = '<option value="">全部團隊</option>';
    allRows.forEach(r => {
      const o = document.createElement('option');
      o.value = r.rowIndex;
      o.textContent = r.team;
      teamSel.appendChild(o);
    });
    teamSel.disabled = false;

    renderList();
  }catch(err){
    result.innerHTML = hintHTML('載入失敗', err.message + '。請重新整理再試一次。');
  }
}

const CLOSED_SET = ['結案','已結案','已撤案','申請未通過'];

function renderList(){
  const pick = teamSel.value; // rowIndex or ''

  if (allRows.length === 0){
    result.innerHTML = hintHTML('此縣市尚無過案資料', '當提案核定後，資料會自動帶入這裡。');
    return;
  }

  // 依主編號(main, G欄)分組
  const groups = {};
  const order = [];
  allRows.forEach(r => {
    const code = String(r.main || '未分類').replace(/\s+/g,'');
    if(!groups[code]){ groups[code]=[]; order.push(code); }
    groups[code].push(r);
  });

  // 若有指定團隊，只顯示該團隊所屬群組、並只展開該團隊
  let showCodes = order;
  if(pick){
    const target = allRows.find(r=>String(r.rowIndex)===String(pick));
    if(target){
      const tc = String(target.main||'未分類').replace(/\s+/g,'');
      showCodes = [tc];
    }
  }

  const countyName = currentCounty.slice(1);
  let html = `<div class="team-count">${countyName}　共 <b>${order.length}</b> 個主計畫</div>`;
  showCodes.forEach(code => { html += groupHTML(code, groups[code]); });
  result.innerHTML = html;
}

// ── 主計畫群組 ──
function groupHTML(code, subs){
  const planName = subs[0].mainPlan || '（無主計畫名稱）';
  const allClosed = subs.every(s => CLOSED_SET.includes(s.status));
  const execCount = subs.filter(s=>s.status==='計畫執行中').length;
  const summary = allClosed ? '全部結束' : (execCount>0 ? `執行中 ${execCount}/${subs.length}` : '進行中');

  const subsHtml = subs.map(s => subCardHTML(s)).join('');

  const archiveBtn = allClosed
    ? `<button class="archive-btn ready" onclick="event.stopPropagation();doArchive('${esc(code)}')">✓ 執行歸檔</button>`
    : `<button class="archive-btn locked" onclick="event.stopPropagation();lockedHint('${esc(code)}',${subs.length-subs.filter(s=>CLOSED_SET.includes(s.status)).length})">尚未可歸檔</button>`;

  return `
  <div class="plan-group ${allClosed?'archivable':''}" data-code="${esc(code)}">
    <div class="plan-head" onclick="toggleGroup('${esc(code)}')">
      <span class="plan-chev">▶</span>
      <div class="plan-info">
        <div class="plan-title-row">
          <span class="plan-code">${esc(code)}</span>
          <span class="plan-name">${esc(planName)}</span>
        </div>
        <div class="plan-meta">
          <span>${subs.length} 個子計畫</span><span class="sep">·</span><span>${summary}</span>
        </div>
      </div>
      ${archiveBtn}
    </div>
    <div class="plan-body">${subsHtml}</div>
  </div>`;
}

// ── 子計畫卡片 ──
function subCardHTML(r){
  const badge = statusBadge(r.status);
  return `
  <div class="sub-card" data-row="${r.rowIndex}">
    <div class="sub-head" onclick="toggleSub(${r.rowIndex})">
      <span class="sub-chev">▶</span>
      <div class="sub-info">
        <div class="sub-name">${esc(r.team || '（無團隊名稱）')}</div>
        <div class="sub-plan">${esc(r.subPlan || '')}</div>
      </div>
      ${badge}
    </div>
    <div class="sub-body" id="body-${r.rowIndex}"></div>
  </div>`;
}

function toggleGroup(code){
  const g = document.querySelector(`.plan-group[data-code="${code}"]`);
  if(g) g.classList.toggle('open');
}

function toggleSub(rowIndex){
  const card = document.querySelector(`.sub-card[data-row="${rowIndex}"]`);
  const wasOpen = card.classList.contains('open');
  if(wasOpen){ card.classList.remove('open'); return; }
  card.classList.add('open');
  const r = allRows.find(x => String(x.rowIndex)===String(rowIndex));
  $(`#body-${rowIndex}`).innerHTML = bodyHTML(r);
}

// ── 歸檔 ──
async function doArchive(code){
  if(!confirm(`確定要將主計畫「${code}」的所有子計畫歸檔到歷史案件嗎？\n此動作會把資料從本縣市分頁移除。`)) return;
  try{
    toast('歸檔中…');
    const url = `${API}?action=archive&county=${encodeURIComponent(currentCounty)}&mainCode=${encodeURIComponent(code)}`;
    const res = await fetch(url);
    const d = await res.json();
    if(!d.ok){
      if(d.notClosedList) { toast(`尚有未結束子計畫：${d.notClosedList.join('、')}`, true); }
      else throw new Error(d.error||'歸檔失敗');
      return;
    }
    toast(`已歸檔 ${d.archived} 個子計畫`);
    await loadCounty();
    loadOverview();
  }catch(err){
    toast('歸檔失敗：'+err.message, true);
  }
}

function lockedHint(code, n){
  toast(`主計畫「${code}」尚有 ${n} 個子計畫未結束，需全部結束才能歸檔`, true);
}

function statusBadge(status){
  if(!status) return '<span class="badge done">未設定</span>';
  let cls = 'review';
  if(status==='結案'||status==='已結案') cls='closed';
  else if(status==='計畫執行中') cls='exec';
  else if(status==='已撤案'||status==='申請未通過') cls='stop';
  else if(status.includes('細審')) cls='review';
  return `<span class="badge ${cls}">${esc(status)}</span>`;
}


// ── 展開內容三區 ──
function bodyHTML(r){
  return `
  ${infoSection(r)}
  ${progressSection(r)}
  ${formSection(r)}
  ${logSection(r)}
  `;
}

// 區1 基本資料
function infoSection(r){
  // [標籤, 值, 跨欄數(預設1)]
  const cells = [
    ['年度', r.year],['類別', r.category],['青培站提案', r.isYouth],
    ['子計畫編號', r.subId],['年期', r.years],['執行地點', r.location],
    ['主計畫名稱', r.mainPlan, 3],
    ['子計畫', r.subPlan, 2],['部會', r.ministry],
    ['部會項目', r.ministryItem, 3],
    ['主持人', r.pi],['聯絡人', r.contact],['聯絡電話', r.phone],
    ['聯絡信箱', r.email, 2],['是否收受電子公文', r.eDoc],
    ['工作會議', r.meeting],['工作會議次別', r.meetingNo],['', '']
  ];
  const grid = cells.map(([k,v,span]) => {
    if(!k) return '<div class="info-cell"></div>';
    const sp = span===3?'span3':(span===2?'span2':'');
    return `<div class="info-cell ${sp}"><div class="k">${k}</div><div class="v ${v?'':'empty'}">${v?esc(v):'—'}</div></div>`;
  }).join('');
  return `
  <div class="section">
    <div class="section-title"><span class="num">1</span>基本資料 <span style="font-weight:400;color:var(--ink-soft);font-size:12px;margin-left:4px">從提案追蹤表自動帶入 · 唯讀</span></div>
    <div class="info-grid">${grid}</div>
    <div class="resync-row">
      <button class="btn-ghost" onclick="doResync(${r.rowIndex})">↻ 從提案表重新同步</button>
      <span class="note">只會補上目前空白的欄位，不會覆蓋已填內容。</span>
    </div>
  </div>`;
}

// 區2 核定後進度（垂直時間軸）
function progressSection(r){
  // 每階段：label, done, active, meta(右側顯示文字)
  const fmtMeta = (stat, date, fallback) => {
    let s = stat || fallback || '尚未';
    if(date) s += ' · ' + date;
    return s;
  };
  const execActive = r.execProg && !['已撤案','申請未通過'].includes(r.execProg);
  const payActive  = r.payment && r.payment!=='尚未' && r.payment!=='尾款已撥付';

  const steps = [
    {lbl:'細部計畫審查', done:r.reviewStat==='已完成', active:r.reviewStat==='進行中',
      meta:fmtMeta(r.reviewStat, r.reviewDate)},
    {lbl:'細部計畫修正', done:r.reviseStat==='已完成', active:r.reviseStat==='進行中',
      meta:fmtMeta(r.reviseStat)},
    {lbl:'細部計畫核定', done:r.approveStat==='已完成', active:r.approveStat==='進行中',
      meta:fmtMeta(r.approveStat, r.approveDate)},
    {lbl:'執行進度', done:false, active:execActive,
      meta: r.execProg ? (r.execProg + (['已撤案','申請未通過'].includes(r.execProg)?'':' · 執行中')) : '尚未'},
    {lbl:'提送核銷', done:r.settlement && r.settlement!=='尚未', active:false,
      meta: r.settlement || '尚未'},
    {lbl:'撥付款項', done:r.payment==='尾款已撥付', active:payActive,
      meta: r.payment || '尚未'},
  ];

  const items = steps.map(s=>{
    const cls = s.done?'done':(s.active?'active':'');
    const icon = s.done?'✓':'';
    return `<div class="tl-item ${cls}">
      <div class="tl-dot">${icon}</div>
      <div class="tl-content">
        <div class="tl-label">${s.lbl}</div>
        <div class="tl-meta">${esc(s.meta)}</div>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="section">
    <div class="section-title"><span class="num">2</span>核定後進度</div>
    <div class="timeline">${items}</div>
  </div>`;
}

// 區3 填寫更新
function formSection(r){
  // 一次性欄位：有值就鎖定
  const onceField = (key,label,val,type='text') => {
    const locked = (val!=='' && val!==null && val!==undefined);
    const lockTag = locked ? '<span class="locked-tag">已鎖定</span>' : '';
    if(type==='select'){
      const opts = OPTIONS[key].map(o=>`<option value="${o}" ${String(val)===o?'selected':''}>${o||'請選擇'}</option>`).join('');
      return `<div class="form-field"><label>${label}${lockTag}</label>
        <select data-field="${key}" ${locked?'disabled':''}>${opts}</select></div>`;
    }
    return `<div class="form-field"><label>${label}${lockTag}</label>
      <input type="text" data-field="${key}" value="${val?esc(val):''}" ${locked?'disabled':''}></div>`;
  };
  const sel = (key,label,val) => {
    const opts = OPTIONS[key].map(o=>`<option value="${o}" ${String(val)===o?'selected':''}>${o||'請選擇'}</option>`).join('');
    return `<div class="form-field"><label>${label}</label>
      <select data-field="${key}">${opts}</select></div>`;
  };
  const txt = (key,label,val,ph='',full=false) => `<div class="form-field ${full?'full':''}"><label>${label}</label>
    <input type="text" data-field="${key}" value="${val?esc(val):''}" placeholder="${ph}"></div>`;

  return `
  <div class="section">
    <div class="section-title"><span class="num">3</span>填寫更新</div>

    <div class="form-group">
      <div class="group-label">一次性資料 <span class="tip">填寫並儲存後即鎖定，不可再修改</span></div>
      <div class="form-grid">
        ${onceField('sysId','系統編號', r.sysId)}
        ${onceField('isLocal','是否為地創計畫', r.isLocal, 'select')}
        ${onceField('budget','實際核撥經費', r.budget)}
        ${onceField('youthName','青培站公司名稱', r.youthName)}
      </div>
    </div>

    <div class="form-group">
      <div class="group-label">進度更新</div>
      <div class="form-grid">
        ${txt('execYear','執行年度', r.execYear, '例：115')}
        <div class="form-field"></div>
        ${sel('reviewStat','細部計畫審查', r.reviewStat)}
        ${txt('reviewDate','細部計畫審查日期', r.reviewDate, '115/05/15（民國年）')}
        ${sel('reviseStat','細部計畫修正', r.reviseStat)}
        <div class="form-field"></div>
        ${sel('approveStat','細部計畫核定', r.approveStat)}
        ${txt('approveDate','細部計畫核定日期', r.approveDate, '115/05/15（民國年）')}
        ${sel('execProg','執行進度', r.execProg)}
        <div class="form-field"></div>
        ${sel('settlement','提送核銷', r.settlement)}
        ${sel('payment','撥付款項', r.payment)}
      </div>
    </div>

    <div class="form-group">
      <div class="group-label">輔導備註</div>
      <div class="form-grid">
        ${txt('note','特殊狀況說明', '', '填寫後會記錄到執行狀況，可留空', true)}
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-save" onclick="saveRow(${r.rowIndex})">儲存更新</button>
      <span class="save-msg" id="msg-${r.rowIndex}"></span>
    </div>
  </div>`;
}

// 執行狀況 log
function logSection(r){
  const raw = (r.execLog||'').split('\n').filter(l=>l.trim() && l.trim()!=='●');
  if(raw.length===0) return '';
  const lines = raw.map(l=>{
    const isSys = l.includes('[系統]');
    return `<div class="log-line ${isSys?'sys':'note'}">${esc(l)}</div>`;
  }).join('');
  return `
  <div class="section">
    <div class="section-title"><span class="num">·</span>執行狀況記錄</div>
    <div class="log-box">${lines}</div>
  </div>`;
}

// ── 儲存：比對有變動的欄位，逐一寫回 ──
async function saveRow(rowIndex){
  const card = document.querySelector(`.sub-card[data-row="${rowIndex}"]`);
  const r = allRows.find(x=>String(x.rowIndex)===String(rowIndex));
  const msg = $(`#msg-${rowIndex}`);
  const btn = card.querySelector('.btn-save');

  // 收集所有欄位
  const fields = card.querySelectorAll('[data-field]');
  const changes = [];
  let noteVal = '';
  fields.forEach(f=>{
    const key = f.dataset.field;
    const val = f.value;
    if(key==='note'){ noteVal = val.trim(); return; }
    if(f.disabled) return; // 鎖定的跳過
    const old = (r[key]===null||r[key]===undefined)?'':String(r[key]);
    if(String(val) !== old){
      changes.push({field:key, value:val});
    }
  });

  if(changes.length===0 && !noteVal){
    msg.textContent = '沒有變更需要儲存';
    msg.className = 'save-msg';
    return;
  }

  btn.disabled = true;
  msg.textContent = '儲存中…';
  msg.className = 'save-msg';

  try{
    // 逐一寫回
    for(const c of changes){
      const url = `${API}?action=write&county=${encodeURIComponent(currentCounty)}&rowIndex=${rowIndex}&field=${c.field}&value=${encodeURIComponent(c.value)}`;
      const res = await fetch(url);
      const d = await res.json();
      if(!d.ok) throw new Error(d.error||'寫入失敗');
    }
    // 備註
    if(noteVal){
      const url = `${API}?action=note&county=${encodeURIComponent(currentCounty)}&rowIndex=${rowIndex}&value=${encodeURIComponent(noteVal)}`;
      const res = await fetch(url);
      const d = await res.json();
      if(!d.ok) throw new Error(d.error||'備註寫入失敗');
    }

    toast('已儲存更新');
    // 重新載入該縣市，刷新顯示
    await loadCounty();
    // 重新展開這張卡
    setTimeout(()=>toggleSub(rowIndex), 100);
  }catch(err){
    msg.textContent = '儲存失敗：' + err.message;
    msg.className = 'save-msg err';
    btn.disabled = false;
  }
}

// ── 重新同步 ──
async function doResync(rowIndex){
  try{
    toast('同步中…');
    const url = `${API}?action=resync&county=${encodeURIComponent(currentCounty)}&rowIndex=${rowIndex}`;
    const res = await fetch(url);
    const d = await res.json();
    if(!d.ok) throw new Error(d.error||'同步失敗');
    if(d.filled>0){
      toast(`已補上 ${d.filled} 個欄位`);
      await loadCounty();
      setTimeout(()=>toggleSub(rowIndex), 100);
    }else{
      toast('沒有可補的空白欄位');
    }
  }catch(err){
    toast('同步失敗：'+err.message, true);
  }
}

// ── 小工具 ──
function hintHTML(big, small){
  return `<div class="hint"><div class="big">${big}</div><div>${small}</div></div>`;
}
function esc(s){
  return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
function toast(msg, isErr){
  const t = $('#toast');
  t.textContent = msg;
  t.className = isErr?'show err':'show';
  setTimeout(()=>t.className=t.className.replace('show','').trim(), 2200);
}

// ── 頁面啟動 ──
loadOverview();

</script>
